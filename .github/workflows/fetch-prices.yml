name: Fiyat Güncelle

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fiyatları çek
        run: |
          python3 << 'EOF'
          import requests, json, time

          url = f"https://www.topaloglualtin.com/api/market-topalog?_t={int(time.time()*1000)}"
          headers = {
              "accept": "*/*",
              "accept-language": "tr-TR,tr;q=0.9",
              "referer": "https://www.topaloglualtin.com/",
              "sec-fetch-mode": "cors",
              "sec-fetch-site": "same-origin",
              "sec-fetch-dest": "empty",
          }

          r = requests.get(url, headers=headers, timeout=15)
          r.raise_for_status()

          data = r.json()
          data["cekme_zamani"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          with open("data.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("Başarılı:", data.get("guncelleme"))
          EOF

      - name: Commit ve push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "fiyat güncelle: $(date -u '+%H:%M:%S')"
          git push
